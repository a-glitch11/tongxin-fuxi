<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>通信原理期末综合练习</title>
  <style>
:root {
  color-scheme: light;
  --bg: #f6f7f9;
  --surface: #ffffff;
  --text: #17202a;
  --muted: #687386;
  --line: #d9dee7;
  --primary: #0f766e;
  --primary-dark: #0b5d57;
  --danger: #b42318;
  --danger-dark: #8f1d14;
  --focus: #2563eb;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  min-width: 0;
}

body {
  min-width: 0;
  margin: 0;
  background: var(--bg);
  color: var(--text);
}

button,
textarea,
input {
  font: inherit;
}

button {
  min-height: 44px;
  border: 0;
  border-radius: 8px;
  padding: 0.7rem 0.9rem;
  background: var(--primary);
  color: #ffffff;
  cursor: pointer;
}

button:hover {
  background: var(--primary-dark);
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

button:focus-visible,
textarea:focus-visible,
input:focus-visible {
  outline: 3px solid color-mix(in srgb, var(--focus) 30%, transparent);
  outline-offset: 2px;
}

button.secondary {
  background: #344054;
}

button.secondary:hover {
  background: #1f2937;
}

button.danger {
  background: var(--danger);
}

button.danger:hover {
  background: var(--danger-dark);
}

.app-header {
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.96);
  backdrop-filter: blur(12px);
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
  padding: 0.8rem 1rem 0.45rem;
}

.brand__title {
  font-size: 1.05rem;
  font-weight: 700;
}

.brand__sub {
  color: var(--muted);
  font-size: 0.85rem;
}

.top-nav {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 0.35rem;
  padding: 0 0.75rem 0.75rem;
}

.top-nav button {
  min-width: 0;
  min-height: 40px;
  padding: 0.55rem 0.35rem;
  border: 1px solid var(--line);
  background: #ffffff;
  color: var(--text);
  font-size: 0.88rem;
}

.top-nav button[aria-current="page"] {
  border-color: var(--primary);
  background: #e6f4f1;
  color: var(--primary-dark);
  font-weight: 700;
}

.app-main {
  width: min(100%, 980px);
  margin: 0 auto;
  padding: 1rem;
}

.view {
  display: grid;
  gap: 1rem;
}

.panel {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  padding: 1rem;
  min-width: 0;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0.5rem;
  font-size: 1.45rem;
  line-height: 1.25;
}

h2 {
  margin-bottom: 0.5rem;
  font-size: 1.1rem;
}

p {
  color: var(--muted);
  line-height: 1.65;
}

.muted {
  color: var(--muted);
}

.action-row,
.action-grid {
  display: grid;
  gap: 0.65rem;
}

.mode-grid,
.config-grid,
.question-actions {
  display: grid;
  gap: 0.65rem;
  margin-top: 1rem;
}

.config-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.field-label {
  display: grid;
  gap: 0.4rem;
  color: var(--muted);
  font-size: 0.9rem;
}

.field-label--wide {
  margin-top: 1rem;
}

.field-input,
.answer-textarea,
.json-textarea {
  width: 100%;
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0.7rem;
  color: var(--text);
  background: #fbfcfe;
  line-height: 1.45;
}

.answer-textarea,
.json-textarea {
  resize: vertical;
}

.practice-head {
  background: #f8fbfb;
}

.question-card {
  display: grid;
  gap: 0.9rem;
}

.question-card.is-submitted {
  border-color: #b9d8d2;
}

.question-title-row {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 0.7rem;
  align-items: start;
}

.question-title {
  min-width: 0;
}

.question-title p {
  color: var(--text);
  overflow-wrap: anywhere;
}

.star-button {
  width: 2rem;
  min-width: 2rem;
  min-height: 2rem;
  padding: 0;
  border: 1px solid var(--line);
  background: #ffffff;
  color: #98a2b3;
  line-height: 1;
}

.star-button:hover {
  background: #fff7df;
  color: #9a6700;
}

.star-button.is-active {
  border-color: #f5b544;
  background: #fff2c7;
  color: #9a6700;
}

.answer-area {
  display: grid;
  gap: 0.55rem;
}

.option-item {
  display: grid;
  grid-template-columns: auto auto minmax(0, 1fr);
  gap: 0.55rem;
  align-items: start;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0.75rem;
  background: #fbfcfe;
  color: var(--text);
}

.option-item input {
  margin-top: 0.2rem;
}

.option-key {
  display: inline-grid;
  place-items: center;
  min-width: 1.55rem;
  min-height: 1.55rem;
  border-radius: 999px;
  background: #eef2f6;
  color: #344054;
  font-weight: 700;
  font-size: 0.82rem;
}

.option-text {
  min-width: 0;
  overflow-wrap: anywhere;
}

.option-item.correct {
  border-color: #15803d;
  background: #ecfdf3;
}

.option-item.correct .option-key {
  background: #15803d;
  color: #ffffff;
}

.option-item.wrong {
  border-color: #b42318;
  background: #fff1f0;
}

.option-item.wrong .option-key {
  background: #b42318;
  color: #ffffff;
}

.option-item.locked {
  cursor: default;
}

.feedback {
  border-radius: 8px;
  padding: 0.85rem;
  border: 1px solid var(--line);
  background: #f8fafc;
}

.feedback.good {
  border-color: #15803d;
  background: #ecfdf3;
}

.feedback.bad {
  border-color: #b42318;
  background: #fff1f0;
}

.feedback p {
  margin-bottom: 0.45rem;
}

.answer-line {
  color: var(--text);
  font-weight: 700;
}

.explanation {
  color: var(--text);
}

.paper-footer {
  position: sticky;
  bottom: 0;
  z-index: 5;
  box-shadow: 0 -8px 18px rgba(16, 24, 40, 0.06);
}

.waveform-placeholder {
  border: 1px dashed var(--line);
  border-radius: 8px;
  padding: 0.8rem;
  color: var(--muted);
  background: #fbfcfe;
}

.json-box {
  display: grid;
  gap: 0.4rem;
  margin-top: 1rem;
  color: var(--muted);
  font-size: 0.9rem;
}

.json-box textarea {
  width: 100%;
  min-width: 0;
  resize: vertical;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0.75rem;
  color: var(--text);
  background: #fbfcfe;
  line-height: 1.45;
  overflow-wrap: anywhere;
}

[hidden] {
  display: none !important;
}

@media (min-width: 640px) {
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0 1rem;
  }

  .brand {
    padding: 0.9rem 0;
  }

  .top-nav {
    display: flex;
    padding: 0;
  }

  .top-nav button {
    padding-inline: 0.9rem;
  }

  .app-main {
    padding: 1.5rem;
  }

  .action-row,
  .action-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .mode-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .config-grid {
    grid-template-columns: repeat(6, minmax(0, 1fr));
  }

  .question-actions {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (min-width: 1024px) {
  .app-main {
    width: min(100%, 1040px);
    padding-inline: 2rem;
  }

  .panel {
    padding: 1.15rem;
  }
}

</style>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand__title">通信原理练习</span>
      <span class="brand__sub">离线版</span>
    </div>
    <nav class="top-nav" aria-label="主导航">
      <button type="button" data-view-link="home" aria-current="page">首页</button>
      <button type="button" data-view-link="practice">做题</button>
      <button type="button" data-view-link="result">结果</button>
      <button type="button" data-view-link="mistake">错题与不熟题</button>
      <button type="button" data-view-link="review">考前速背</button>
    </nav>
  </header>

  <main class="app-main">
    <section id="view-home" class="view" data-view="home">
      <div class="panel">
        <h1>期末综合练习</h1>
        <p>当前完成任务 A：页面骨架、离线加载顺序、状态持久化与延迟提交状态机。</p>
        <div class="action-row">
          <button type="button" data-route="practice">开始做题</button>
          <button type="button" data-route="review" class="secondary">考前速背</button>
        </div>
      </div>

      <section class="panel state-panel" aria-labelledby="state-tools-title">
        <h2 id="state-tools-title">状态工具</h2>
        <p id="storage-status" class="muted">正在读取本地状态...</p>
        <div class="action-grid">
          <button type="button" id="export-state">导出 JSON</button>
          <button type="button" id="import-state" class="secondary">导入 JSON</button>
          <button type="button" id="reset-state" class="danger">重置状态</button>
        </div>
        <label class="json-box">
          <span>JSON</span>
          <textarea id="state-json" spellcheck="false" rows="8"></textarea>
        </label>
      </section>
    </section>

    <section id="view-practice" class="view" data-view="practice" hidden>
      <div class="panel">
        <h1>做题</h1>
        <p>任务 A 不包含题库、抽题算法或判分逻辑。后续任务会在这里挂载试卷界面。</p>
      </div>
    </section>

    <section id="view-result" class="view" data-view="result" hidden>
      <div class="panel">
        <h1>结果</h1>
        <p id="pending-status">暂无待提交结果。</p>
        <div class="action-grid">
          <button type="button" id="commit-pending">加入错题库，进入下一套</button>
          <button type="button" id="redo-pending" class="secondary">重做错题/不熟题</button>
          <button type="button" id="discard-pending" class="danger">重新生成一套，不保存本次记录</button>
        </div>
      </div>
    </section>

    <section id="view-mistake" class="view" data-view="mistake" hidden>
      <div class="panel">
        <h1>错题与不熟题</h1>
        <p>历史错题与不熟题练习区将在此渲染。</p>
      </div>
    </section>

    <section id="view-review" class="view" data-view="review" hidden>
      <div class="panel">
        <h1>考前速背</h1>
        <p>任务 A 只预留视图容器。速背内容会在后续任务接入。</p>
      </div>
    </section>
  </main>

  <script>
/*
 * 职责：题库层；固化课程作业原题与同知识点衍生题。
 * 状态读写：不读取、不写入 State/localStorage；只挂载 window.CP.tags 与 window.CP.questions。
 */
window.CP = window.CP || {};

window.CP.tags = {
  comm_basics: "通信系统基础概念",
  info_unit: "信息量单位",
  info_amount: "信息量计算",
  baud_rate: "码元速率",
  info_rate: "信息速率",
  mary_bits: "多进制码元比特数",
  ber_ser: "误码率与误信率",
  energy_power_signal: "能量信号与功率信号",
  gaussian_linear: "高斯过程与线性系统",
  wss: "广义平稳随机过程",
  autocorr_r0_rinf: "自相关函数特征值",
  channel_const_random: "恒参信道与随参信道",
  additive_multiplicative: "加性干扰与乘性干扰",
  shannon: "香农容量公式",
  db_linear: "dB与线性信噪比",
  bw_infinite_capacity: "无限带宽容量极限",
  am_dsb_ssb_fdm: "AM/DSB/SSB/FDM",
  ma_index: "调幅系数",
  fm_beta: "调频指数",
  carson: "卡森公式",
  direct_fm: "直接调频法",
  fm_pm_trap: "FM/PM判别陷阱",
  line_codes: "数字基带码型",
  isi: "码间串扰",
  baseband_spectrum: "基带功率谱",
  optimal_threshold: "最佳判决门限",
  psk_anti_noise: "2PSK抗噪性能",
  ask_threshold_sensitive: "2ASK门限敏感性",
  fsk_spectral_eff: "2FSK频带利用率",
  hdb3_rule: "HDB3编码规则",
  ook_fsk_psk_waveform: "OOK/2FSK/2PSK波形"
};

window.CP.questions = [
  {
    id: "CP-S-001",
    type: "single",
    question: "已知二进制2分钟内共传送了72000个码元，码元速率是（ ），如果码元脉冲保持不变，改为八进制数字信号，码元速率是（ ）。",
    options: [
      { key: "A", text: "72000 Baud，28000 Baud" },
      { key: "B", text: "36000 Baud，12000 Baud" },
      { key: "C", text: "36000 Baud，36000 Baud" },
      { key: "D", text: "600 Baud，600 Baud" }
    ],
    answer: "D",
    explanation: "码元速率 RB=码元数/时间=72000/(2×60)=600 Baud。码元脉冲保持不变时码元持续时间不变，所以改为八进制后码元速率仍为600 Baud。",
    knowledgeTag: "baud_rate",
    difficulty: 1,
    sourceGroup: "作业1"
  },
  {
    id: "CP-S-002",
    type: "single",
    question: "已知二进制2分钟内共传送了72000个码元，信息速率是（ ），如果码元脉冲保持不变，改为八进制数字信号，信息速率是（ ）。",
    options: [
      { key: "A", text: "600 bit/s，600 bit/s" },
      { key: "B", text: "600 bit/s，1800 bit/s" },
      { key: "C", text: "1800 bit/s，600 bit/s" },
      { key: "D", text: "1800 bit/s，1800 bit/s" }
    ],
    answer: "B",
    explanation: "二进制每码元携带log2(2)=1 bit，Rb=600 bit/s；八进制每码元携带log2(8)=3 bit，Rb=600×3=1800 bit/s。",
    knowledgeTag: "info_rate",
    difficulty: 1,
    sourceGroup: "作业1"
  },
  {
    id: "CP-S-003",
    type: "single",
    question: "已知一个十六进制的数字传输系统，若其码元速率为2000 Baud，则该系统最大可能的信息速率为（ ）。",
    options: [
      { key: "A", text: "2000 bit/s" },
      { key: "B", text: "4000 bit/s" },
      { key: "C", text: "1000 bit/s" },
      { key: "D", text: "8000 bit/s" }
    ],
    answer: "D",
    explanation: "十六进制M=16，每码元携带log2(16)=4 bit，所以信息速率Rb=2000×4=8000 bit/s。",
    knowledgeTag: "mary_bits",
    difficulty: 1,
    sourceGroup: "作业1"
  },
  {
    id: "CP-S-004",
    type: "single",
    question: "在信道上传输的是（ ）的通信系统称为模拟通信系统。",
    options: [
      { key: "A", text: "以上均不对" },
      { key: "B", text: "数字信号" },
      { key: "C", text: "任何信号" },
      { key: "D", text: "模拟信号" }
    ],
    answer: "D",
    explanation: "模拟通信系统在信道上传输模拟信号；数字通信系统在信道上传输数字信号。",
    knowledgeTag: "comm_basics",
    difficulty: 1,
    sourceGroup: "作业1"
  },
  {
    id: "CP-S-005",
    type: "single",
    question: "通信双方都能收发消息，但不能同时收发的工作方式属于（ ）。",
    options: [
      { key: "A", text: "半双工通信" },
      { key: "B", text: "单工通信" },
      { key: "C", text: "双工通信" }
    ],
    answer: "A",
    explanation: "半双工通信允许双方都能发送和接收，但同一时刻只能单向传输。",
    knowledgeTag: "comm_basics",
    difficulty: 1,
    sourceGroup: "作业1"
  },
  {
    id: "CP-S-006",
    type: "single",
    question: "衡量数字通信系统传输质量的指标是（ ）。",
    options: [
      { key: "A", text: "信噪比" },
      { key: "B", text: "噪声功率" },
      { key: "C", text: "误码率" },
      { key: "D", text: "话音清晰度" }
    ],
    answer: "C",
    explanation: "数字通信系统可靠性的常用质量指标是误码率。",
    knowledgeTag: "ber_ser",
    difficulty: 1,
    sourceGroup: "作业1"
  },
  {
    id: "CP-S-007",
    type: "single",
    question: "设平稳随机过程X(t)的自相关函数为R(τ)，则R(0)表示X(t)的（ ）。",
    options: [
      { key: "A", text: "直流功率" },
      { key: "B", text: "总能量" },
      { key: "C", text: "平均功率" },
      { key: "D", text: "方差" }
    ],
    answer: "C",
    explanation: "平稳随机过程的R(0)=E[X²(t)]，表示平均功率。",
    knowledgeTag: "autocorr_r0_rinf",
    difficulty: 1,
    sourceGroup: "作业2"
  },
  {
    id: "CP-S-008",
    type: "single",
    question: "设平稳随机过程X(t)的自相关函数为R(τ)，当τ趋于无穷时R(τ)表示X(t)的（ ）。",
    options: [
      { key: "A", text: "平均功率" },
      { key: "B", text: "方差" },
      { key: "C", text: "直流功率" },
      { key: "D", text: "总能量" }
    ],
    answer: "C",
    explanation: "R(∞)等于均值平方，反映随机过程的直流功率。",
    knowledgeTag: "autocorr_r0_rinf",
    difficulty: 1,
    sourceGroup: "作业2"
  },
  {
    id: "CP-S-009",
    type: "single",
    question: "以下属于无线信道的是（ ）。",
    options: [
      { key: "A", text: "电磁波" },
      { key: "B", text: "双绞线" },
      { key: "C", text: "电缆" },
      { key: "D", text: "光纤" }
    ],
    answer: "A",
    explanation: "电磁波传播属于无线传输媒介；双绞线、电缆、光纤属于有线媒介。",
    knowledgeTag: "channel_const_random",
    difficulty: 1,
    sourceGroup: "作业3"
  },
  {
    id: "CP-S-010",
    type: "single",
    question: "设一数字传输系统传送8进制码元，码元传输速率为1200 Baud，此时该系统的信息传输速率为（ ）。",
    options: [
      { key: "A", text: "1200 bit/s" },
      { key: "B", text: "3600 bit/s" },
      { key: "C", text: "4800 bit/s" },
      { key: "D", text: "2400 bit/s" }
    ],
    answer: "B",
    explanation: "8进制每码元携带3 bit，因此Rb=1200×3=3600 bit/s。",
    knowledgeTag: "info_rate",
    difficulty: 1,
    sourceGroup: "作业3"
  },
  {
    id: "CP-S-011",
    type: "single",
    question: "根据香农公式可知，为了使信道容量趋于无穷大，不可以采取下列哪项措施？",
    options: [
      { key: "A", text: "噪声功率谱密度始终为零" },
      { key: "B", text: "系统带宽为无穷大" },
      { key: "C", text: "噪声功率为零" },
      { key: "D", text: "信号发射功率为无穷大" }
    ],
    answer: "B",
    explanation: "C=B log2(1+S/N)。在噪声功率随带宽增加的通常模型下，单纯令B趋于无穷并不会使容量趋于无穷。",
    knowledgeTag: "bw_infinite_capacity",
    difficulty: 2,
    sourceGroup: "作业3"
  },
  {

  <script>
/*
 * 职责：管理 State(localStorage "cp_state_v1") 与内存 pendingResult。
 * 状态读写：读取/写入 version、history、wrongBank、weakBank、tagStats、settings.paperConfig；
 * pendingResult 仅保存在内存，setPendingResult 不写 localStorage，commitPendingResult 才落盘。
 */
(function (window) {
  var STORAGE_KEY = "cp_state_v1";
  var VALID_CONFIDENCE = { sure: true, unsure: true, guess: true };
  var CP = window.CP = window.CP || {};
  var currentState = makeDefaultState();
  var pendingResult = null;

  function makeDefaultState() {
    return {
      version: 1,
      history: [],
      wrongBank: [],
      weakBank: [],
      tagStats: {},
      settings: {
        paperConfig: {
          single: 0,
          multiple: 0,
          judge: 0,
          blank: 0,
          calculation: 0,
          waveform: 0
        }
      }
    };
  }

  function clone(value) {
    return JSON.parse(JSON.stringify(value));
  }

  function isObject(value) {
    return value !== null && typeof value === "object" && !Array.isArray(value);
  }

  function uniqueStrings(items) {
    var seen = {};
    var result = [];
    if (!Array.isArray(items)) {
      return result;
    }
    items.forEach(function (item) {
      if (item === null || item === undefined) {
        return;
      }
      var key = String(item);
      if (!seen[key]) {
        seen[key] = true;
        result.push(key);
      }
    });
    return result;
  }

  function normalizePaperConfig(config) {
    var defaults = makeDefaultState().settings.paperConfig;
    var source = isObject(config) ? config : {};
    var normalized = {};
    Object.keys(defaults).forEach(function (key) {
      var value = Number(source[key]);
      normalized[key] = Number.isFinite(value) && value >= 0 ? Math.floor(value) : defaults[key];
    });
    return normalized;
  }

  function normalizeTagStat(stat) {
    var source = isObject(stat) ? stat : {};
    return {
      attempts: Math.max(0, Number(source.attempts) || 0),
      correct: Math.max(0, Number(source.correct) || 0),
      wrong: Math.max(0, Number(source.wrong) || 0),
      unsure: Math.max(0, Number(source.unsure) || 0),
      markedWeak: Math.max(0, Number(source.markedWeak) || 0),
      consecutiveCorrect: Math.max(0, Number(source.consecutiveCorrect) || 0),
      masteryScore: clamp(Number(source.masteryScore) || 0, 0, 100),
      drillRounds: Math.max(0, Number(source.drillRounds) || 0)
    };
  }

  function normalizeTagStats(tagStats) {
    var normalized = {};
    if (!isObject(tagStats)) {
      return normalized;
    }
    Object.keys(tagStats).forEach(function (tag) {
      normalized[tag] = normalizeTagStat(tagStats[tag]);
    });
    return normalized;
  }

  function normalizeHistoryItem(item) {
    var source = isObject(item) ? item : {};
    return {
      qid: source.qid === undefined || source.qid === null ? "" : String(source.qid),
      userAnswer: source.userAnswer === undefined ? null : source.userAnswer,
      correct: source.correct === true,
      confidence: VALID_CONFIDENCE[source.confidence] ? source.confidence : "sure"
    };
  }

  function normalizeHistoryEntry(entry) {
    var source = isObject(entry) ? entry : {};
    return {
      paperId: source.paperId === undefined || source.paperId === null ? "" : String(source.paperId),
      date: source.date ? String(source.date) : new Date().toISOString(),
      score: Number(source.score) || 0,
      items: Array.isArray(source.items) ? source.items.map(normalizeHistoryItem) : []
    };
  }

  function normalizeState(state) {
    var source = isObject(state) ? state : {};
    return {
      version: 1,
      history: Array.isArray(source.history) ? source.history.map(normalizeHistoryEntry) : [],
      wrongBank: uniqueStrings(source.wrongBank),
      weakBank: uniqueStrings(source.weakBank),
      tagStats: normalizeTagStats(source.tagStats),
      settings: {
        paperConfig: normalizePaperConfig(source.settings && source.settings.paperConfig)
      }
    };
  }

  function normalizePendingItem(item) {
    var normalized = normalizeHistoryItem(item);
    var source = isObject(item) ? item : {};
    normalized.markedWeak = source.markedWeak === true;
    normalized.tags = normalizeItemTags(source);
    return normalized;
  }

  function normalizePendingResult(result) {
    var source = isObject(result) ? result : {};
    return {
      paperId: source.paperId === undefined || source.paperId === null ? "" : String(source.paperId),
      date: source.date ? String(source.date) : new Date().toISOString(),
      score: Number(source.score) || 0,
      items: Array.isArray(source.items) ? source.items.map(normalizePendingItem) : []
    };
  }

  function normalizeItemTags(item) {
    var tags = [];
    if (Array.isArray(item.tags)) {
      tags = item.tags;
    } else if (item.tag !== undefined && item.tag !== null) {
      tags = [item.tag];
    }
    return uniqueStrings(tags).filter(function (tag) {
      return tag.length > 0;
    });
  }

  function toHistoryEntry(result) {
    return {
      paperId: result.paperId,
      date: result.date,
      score: result.score,
      items: result.items.map(normalizeHistoryItem)
    };
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function recalcMastery(stat) {
    if (!stat.attempts) {
      return 0;
    }
    var accuracy = stat.correct / stat.attempts;
    var uncertaintyPenalty = stat.unsure / stat.attempts * 20;
    var weakPenalty = stat.markedWeak / stat.attempts * 15;
    return Math.round(clamp(accuracy * 100 - uncertaintyPenalty - weakPenalty, 0, 100));
  }

  function applyBanks(state, items) {
    var wrongHits = {};
    var weakHits = {};

    items.forEach(function (item) {
      if (!item.qid) {
        return;
      }
      if (item.correct === false) {
        wrongHits[item.qid] = true;
      } else if (item.confidence === "unsure" || item.confidence === "guess" || item.markedWeak) {
        weakHits[item.qid] = true;
      }
    });

    state.wrongBank = uniqueStrings(state.wrongBank.concat(Object.keys(wrongHits)));
    var wrongSet = {};
    state.wrongBank.forEach(function (qid) {
      wrongSet[qid] = true;
    });

    state.weakBank = uniqueStrings(state.weakBank.concat(Object.keys(weakHits))).filter(function (qid) {
      return !wrongSet[qid];
    });
  }

  function applyTagStats(state, items) {
    items.forEach(function (item) {
      item.tags.forEach(function (tag) {
        var stat = normalizeTagStat(state.tagStats[tag]);
        stat.attempts += 1;
        if (item.correct) {
          stat.correct += 1;
          stat.consecutiveCorrect += 1;
        } else {
          stat.wrong += 1;
          stat.consecutiveCorrect = 0;
        }
        if (item.confidence === "unsure" || item.confidence === "guess") {
          stat.unsure += 1;
        }
        if (item.markedWeak) {
          stat.markedWeak += 1;
        }
        stat.masteryScore = recalcMastery(stat);
        state.tagStats[tag] = stat;
      });
    });
  }

  function load() {
    var raw = window.localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      currentState = makeDefaultState();
      return clone(currentState);
    }
    try {
      currentState = normalizeState(JSON.parse(raw));
    } catch (error) {
      currentState = makeDefaultState();
    }
    return clone(currentState);
  }

  function save(state) {
    currentState = normalizeState(state || currentState);
    window.localStorage.setItem(STORAGE_KEY, JSON.stringify(currentState));
    return clone(currentState);
  }

  function reset() {
    currentState = makeDefaultState();
    pendingResult = null;
    window.localStorage.setItem(STORAGE_KEY, JSON.stringify(currentState));
    return clone(currentState);
  }

  function exportJSON() {
    return JSON.stringify(currentState, null, 2);
  }

  function importJSON(json) {
    currentState = normalizeState(JSON.parse(json));
    pendingResult = null;
    window.localStorage.setItem(STORAGE_KEY, JSON.stringify(currentState));
    return clone(currentState);
  }

  function setPendingResult(result) {
    pendingResult = normalizePendingResult(result);
    return clone(pendingResult);
  }

  function commitPendingResult() {
    if (!pendingResult) {
      return null;
    }
    currentState = normalizeState(currentState);
    currentState.history.push(toHistoryEntry(pendingResult));
    applyBanks(currentState, pendingResult.items);
    applyTagStats(currentState, pendingResult.items);
    save(currentState);
    var committed = clone(pendingResult);
    pendingResult = null;
    return committed;
  }

  function discardPendingResult() {
    var discarded = pendingResult ? clone(pendingResult) : null;
    pendingResult = null;
    return discarded;
  }

  function getPendingResult() {
    return pendingResult ? clone(pendingResult) : null;
  }

  function getState() {
    return clone(currentState);
  }

  CP.state = {
    load: load,
    save: save,
    reset: reset,
    exportJSON: exportJSON,
    importJSON: importJSON,
    setPendingResult: setPendingResult,
    commitPendingResult: commitPendingResult,
    discardPendingResult: discardPendingResult,
    getPendingResult: getPendingResult,
    getState: getState
  };
})(window);

</script>
  <script>
/*
 * 职责：引擎层；提供抽题、组卷、错题/不熟题重练、薄弱/低练习标签分析与加权选题。
 * 状态读写：只通过 window.CP.state.getState() 读取 history、wrongBank、weakBank、tagStats、settings.paperConfig；
 * 不写 State/localStorage，不操作 DOM，不渲染页面。
 */
(function (window) {
  var CP = window.CP = window.CP || {};
  var TYPE_ORDER = ["single", "multiple", "judge", "blank", "calculation", "waveform"];
  var VALID_MODES = { comprehensive: true, theory: true, calculation: true, waveform: true };
  var CORE_TAGS = [
    "info_unit", "info_amount", "baud_rate", "info_rate", "mary_bits", "ber_ser",
    "shannon", "db_linear", "bw_infinite_capacity", "am_dsb_ssb_fdm", "ma_index",
    "fm_beta", "carson", "fm_pm_trap", "line_codes", "isi", "optimal_threshold",
    "psk_anti_noise", "ask_threshold_sensitive", "fsk_spectral_eff", "hdb3_rule",
    "ook_fsk_psk_waveform", "comm_basics"
  ];

  function clone(value) {
    return JSON.parse(JSON.stringify(value));
  }

  function getQuestions() {
    return Array.isArray(CP.questions) ? CP.questions : [];
  }

  function getTags() {
    return CP.tags && typeof CP.tags === "object" ? CP.tags : {};
  }

  function getStateSnapshot() {
    if (CP.state && typeof CP.state.getState === "function") {
      return CP.state.getState();
    }
    return {
      history: [],
      wrongBank: [],
      weakBank: [],
      tagStats: {},
      settings: { paperConfig: {} }
    };
  }

  function normalizeConfig(config) {
    var source = config || {};
    var normalized = {};
    TYPE_ORDER.forEach(function (type) {
      var value = Number(source[type]);
      normalized[type] = Number.isFinite(value) && value > 0 ? Math.floor(value) : 0;
    });
    return normalized;
  }

  function defaultDrillConfig() {
    var fromState = getStateSnapshot().settings && getStateSnapshot().settings.paperConfig;
    var normalized = normalizeConfig(fromState);
    var total = TYPE_ORDER.reduce(function (sum, type) {
      return sum + normalized[type];
    }, 0);
    return total > 0 ? normalized : {
      single: 5,
      multiple: 5,
      judge: 5,
      blank: 5,
      calculation: 3,
      waveform: 2
    };
  }

  function normalizeMode(options) {
    var mode = options && options.mode;
    return VALID_MODES[mode] ? mode : "comprehensive";
  }

  function makeQuestionMap() {
    var map = {};
    getQuestions().forEach(function (question) {
      map[question.id] = question;
    });
    return map;
  }

  function uniqueStrings(items) {
    var seen = {};
    var result = [];
    (Array.isArray(items) ? items : []).forEach(function (item) {
      if (item === null || item === undefined) {
        return;
      }
      var key = String(item);
      if (!seen[key]) {
        seen[key] = true;
        result.push(key);
      }
    });
    return result;
  }

  function makeRng(seed) {
    if (seed === undefined || seed === null) {
      return Math.random;
    }
    var value = 0;
    String(seed).split("").forEach(function (ch) {
      value = (value * 31 + ch.charCodeAt(0)) >>> 0;
    });
    return function () {
      value = (value * 1664525 + 1013904223) >>> 0;
      return value / 4294967296;
    };
  }

  function makePaperId(prefix, rng) {
    var randomPart = Math.floor(rng() * 1000000).toString(36);
    return prefix + "-" + Date.now().toString(36) + "-" + randomPart;
  }

  function hasHistory(state) {
    var history = Array.isArray(state.history) && state.history.length > 0;
    var banks = (Array.isArray(state.wrongBank) && state.wrongBank.length > 0) ||
      (Array.isArray(state.weakBank) && state.weakBank.length > 0);
    var stats = Object.keys(state.tagStats || {}).some(function (tag) {
      return Number(state.tagStats[tag] && state.tagStats[tag].attempts) > 0;
    });
    return history || banks || stats;
  }

  function getStatsForTag(state, tag) {
    var stat = state.tagStats && state.tagStats[tag] ? state.tagStats[tag] : {};
    return {
      attempts: Math.max(0, Number(stat.attempts) || 0),
      correct: Math.max(0, Number(stat.correct) || 0),
      wrong: Math.max(0, Number(stat.wrong) || 0),
      unsure: Math.max(0, Number(stat.unsure) || 0),
      markedWeak: Math.max(0, Number(stat.markedWeak) || 0),
      consecutiveCorrect: Math.max(0, Number(stat.consecutiveCorrect) || 0),
      masteryScore: Math.max(0, Math.min(100, Number(stat.masteryScore) || 0)),
      drillRounds: Math.max(0, Number(stat.drillRounds) || 0)
    };
  }

  function bankTagInfo(state) {
    var qmap = makeQuestionMap();
    var wrongIds = uniqueStrings(state.wrongBank);
    var weakIds = uniqueStrings(state.weakBank).filter(function (id) {
      return wrongIds.indexOf(id) === -1;
    });
    var tags = {};
    wrongIds.concat(weakIds).forEach(function (id) {
      var q = qmap[id];
      if (q && q.knowledgeTag) {
        tags[q.knowledgeTag] = true;
      }
    });
    return {
      wrongIds: wrongIds,
      weakIds: weakIds,
      tags: Object.keys(tags)
    };
  }

  function getUntestedOrLowAttemptTags(limit) {
    var state = getStateSnapshot();
    var tags = getTags();
    var threshold = Number(limit);
    threshold = Number.isFinite(threshold) ? threshold : 1;
    return Object.keys(tags).map(function (tag) {
      var stat = getStatsForTag(state, tag);
      var untestedBonus = stat.attempts === 0 ? 100 : 0;
      var lowAttemptBonus = stat.attempts > 0 && stat.attempts <= threshold ? 60 - stat.attempts * 10 : 0;
      return {
        tag: tag,
        label: tags[tag],
        attempts: stat.attempts,
        score: untestedBonus + Math.max(0, lowAttemptBonus),
        stats: stat
      };
    }).filter(function (entry) {
      return entry.attempts <= threshold;
    }).sort(function (a, b) {
      if (b.score !== a.score) {
        return b.score - a.score;
      }
      return a.tag.localeCompare(b.tag);
    });
  }

  function getWeakTags() {
    var state = getStateSnapshot();
    var tags = getTags();
    var bankTags = bankTagInfo(state).tags;
    return Object.keys(tags).map(function (tag) {
      var stat = getStatsForTag(state, tag);
      var attempts = Math.max(1, stat.attempts);
      var wrongRate = stat.wrong / attempts;
      var unsureRate = stat.unsure / attempts;
      var markedRate = stat.markedWeak / attempts;
      var lowMastery = 100 - stat.masteryScore;
      var consecutivePenalty = stat.attempts > 0 && stat.consecutiveCorrect < 2 ? 10 : 0;
      var bankPenalty = bankTags.indexOf(tag) >= 0 ? 15 : 0;
      var score = Math.round(Math.min(100,
        wrongRate * 35 +
        unsureRate * 20 +
        markedRate * 20 +
        lowMastery * 0.25 +
        consecutivePenalty +
        bankPenalty
      ));
      return {
        tag: tag,
        label: tags[tag],
        score: score,
        stats: stat,
        reasons: {
          wrongRate: wrongRate,
          unsureRate: unsureRate,
          markedWeakRate: markedRate,
          masteryScore: stat.masteryScore,
          consecutiveCorrect: stat.consecutiveCorrect,
          inWrongOrWeakBank: bankTags.indexOf(tag) >= 0
        }
      };
    }).filter(function (entry) {
      return entry.score > 0 || entry.stats.attempts > 0;
    }).sort(function (a, b) {
      if (b.score !== a.score) {
        return b.score - a.score;
      }
      return a.tag.localeCompare(b.tag);
    });
  }

  function modeWeight(question, mode) {
    if (mode === "theory") {
      return question.type === "calculation" || question.type === "waveform" ? 0.55 : 1.25;
    }
    if (mode === "calculation") {
      return question.type === "calculation" ? 1.8 : 0.75;
    }
    if (mode === "waveform") {
      return question.type === "waveform" ? 1.8 : 0.75;
    }
    return 1;
  }

  function questionWeight(question, context) {
    var state = context.state || getStateSnapshot();
    var tag = question.knowledgeTag;
    var stat = getStatsForTag(state, tag);
    var preferredTags = context.preferredTags || [];
    var lowTags = context.lowTags || [];
    var coreTags = context.coreTags || CORE_TAGS;
    var bankTags = context.bankTags || [];
    var weight = 1;

    if (preferredTags.indexOf(tag) >= 0) {
      weight += 6;
    }
    if (bankTags.indexOf(tag) >= 0) {
      weight += 4;
    }
    if (lowTags.indexOf(tag) >= 0) {
      weight += 4;
    }
    if (coreTags.indexOf(tag) >= 0) {
      weight += 2;
    }
    if (stat.attempts > 0) {
      weight += Math.max(0, (100 - stat.masteryScore) / 25);
      weight += Math.min(3, stat.wrong / Math.max(1, stat.attempts) * 3);
      weight += Math.min(2, stat.unsure / Math.max(1, stat.attempts) * 2);
    }
    if (stat.drillRounds >= 3) {
      weight *= 0.2;
    }
    weight *= modeWeight(question, context.mode || "comprehensive");
    return Math.max(0.05, weight);
  }

  function weightedPick(candidates, count, context) {
    var rng = context.rng || Math.random;
    var pool = candidates.slice();
    var chosen = [];
    while (pool.length > 0 && chosen.length < count) {
      var total = pool.reduce(function (sum, question) {
        return sum + questionWeight(question, context);
      }, 0);
      var target = rng() * total;
      var acc = 0;
      var index = 0;
      for (; index < pool.length; index += 1) {
        acc += questionWeight(pool[index], context);
        if (acc >= target) {
          break;
        }
      }
      chosen.push(pool.splice(Math.min(index, pool.length - 1), 1)[0]);
    }
    return chosen;
  }

  function selectWeightedQuestions(candidates, count, context) {
    var selectedIds = context && context.selectedIds ? context.selectedIds : {};
    var safeContext = context || {};
    var filtered = (Array.isArray(candidates) ? candidates : []).filter(function (question) {
      return question && question.id && !selectedIds[question.id];
    });
    var chosen = weightedPick(filtered, Math.max(0, Number(count) || 0), safeContext);
    chosen.forEach(function (question) {
      selectedIds[question.id] = true;
    });
    return chosen.map(clone);
  }

  function allocateCounts(total, ratios) {
    var keys = Object.keys(ratios);
    var allocation = {};
    var used = 0;
    var remainders = keys.map(function (key) {
      var raw = total * ratios[key];
      var base = Math.floor(raw);
      allocation[key] = base;
      used += base;
      return { key: key, rest: raw - base };
    }).sort(function (a, b) {
      return b.rest - a.rest;
    });
    var remaining = total - used;
    remainders.forEach(function (item) {
      if (remaining > 0) {
        allocation[item.key] += 1;
        remaining -= 1;
      }
    });
    return allocation;
  }

  function coveragePick(candidates, count, selectedIds, rng) {
    var byTag = {};
    candidates.forEach(function (question) {
      if (!selectedIds[question.id]) {
        var tag = question.knowledgeTag || "";
        byTag[tag] = byTag[tag] || [];
        byTag[tag].push(question);
      }
    });
    Object.keys(byTag).forEach(function (tag) {
      byTag[tag].sort(function () {
        return rng() - 0.5;
      });
    });
    var tags = Object.keys(byTag).sort(function () {
      return rng() - 0.5;
    });
    var chosen = [];
    while (chosen.length < count && tags.length > 0) {
      var progressed = false;
      tags.slice().forEach(function (tag) {
        if (chosen.length >= count) {
          return;
        }
        var list = byTag[tag];
        while (list.length && selectedIds[list[0].id]) {
          list.shift();
        }
        if (list.length) {
          var question = list.shift();
          selectedIds[question.id] = true;
          chosen.push(question);
          progressed = true;
        }
      });
      tags = tags.filter(function (tag) {
        return byTag[tag].length > 0;
      });
      if (!progressed) {
        break;
      }
    }
    return chosen;
  }

  function candidatesByType(type) {
    return getQuestions().filter(function (question) {
      return question.type === type;
    });
  }

  function buildPaper(config, options) {
    var state = getStateSnapshot();
    var mode = normalizeMode(options);
    var rng = makeRng(options && options.seed);
    var requested = normalizeConfig(config);
    var selectedIds = {};
    var items = [];
    var meta = {
      mode: mode,
      requestedConfig: clone(requested),
      actualCounts: {},
      sources: {
        wrongWeakVariant: 0,
        lowAttempt: 0,
        core: 0,
        random: 0,
        firstPaperCoverage: 0,
        fallbackSameType: 0
      },
      degraded: [],
      drillRoundDampenedTags: []
    };
    var historyExists = hasHistory(state);
    var bankInfo = bankTagInfo(state);
    var questionMap = makeQuestionMap();
    var lowTagEntries = getUntestedOrLowAttemptTags(1);
    var lowTags = lowTagEntries.map(function (entry) {
      return entry.tag;
    });
    var dampenedTags = Object.keys(getTags()).filter(function (tag) {
      return getStatsForTag(state, tag).drillRounds >= 3;
    });
    meta.drillRoundDampenedTags = dampenedTags;

    TYPE_ORDER.forEach(function (type) {
      var needed = requested[type];
      if (!needed) {
        return;
      }
      var typeCandidates = candidatesByType(type);
      var picked = [];
      if (!historyExists || mode !== "comprehensive") {
        picked = coveragePick(typeCandidates, needed, selectedIds, rng);
        meta.sources.firstPaperCoverage += picked.length;
      } else {
        var allocation = allocateCounts(needed, {
          wrongWeakVariant: 0.4,
          lowAttempt: 0.3,
          core: 0.2,
          random: 0.1
        });
        var sourceSpecs = [
          {
            name: "wrongWeakVariant",
            count: allocation.wrongWeakVariant,
            candidates: typeCandidates.filter(function (q) {
              return bankInfo.tags.indexOf(q.knowledgeTag) >= 0 &&
                bankInfo.wrongIds.concat(bankInfo.weakIds).indexOf(q.id) === -1;
            }),
            preferredTags: bankInfo.tags
          },
          {
            name: "lowAttempt",
            count: allocation.lowAttempt + (dampenedTags.length ? 1 : 0),
            candidates: typeCandidates.filter(function (q) {
              return lowTags.indexOf(q.knowledgeTag) >= 0;
            }),
            preferredTags: lowTags
          },
          {
            name: "core",
            count: allocation.core,
            candidates: typeCandidates.filter(function (q) {
              return CORE_TAGS.indexOf(q.knowledgeTag) >= 0;
            }),
            preferredTags: CORE_TAGS
          },
          {
            name: "random",
            count: allocation.random,
            candidates: typeCandidates,
            preferredTags: []
          }
        ];

        sourceSpecs.forEach(function (spec) {
          if (picked.length >= needed || spec.count <= 0) {
            return;
          }
          var take = Math.min(spec.count, needed - picked.length);
          var chosen = selectWeightedQuestions(spec.candidates, take, {
            selectedIds: selectedIds,
            state: state,
            preferredTags: spec.preferredTags,
            lowTags: lowTags,
            coreTags: CORE_TAGS,
            bankTags: bankInfo.tags,
            mode: mode,
            rng: rng
          });
          if (spec.name === "wrongWeakVariant" && chosen.length < take) {
            bankInfo.wrongIds.concat(bankInfo.weakIds).forEach(function (id) {
              var question = questionMap[id];
              if (chosen.length >= take || !question || selectedIds[id]) {
                return;
              }
              if (question.type === type && bankInfo.tags.indexOf(question.knowledgeTag) >= 0) {
                selectedIds[id] = true;
                chosen.push(clone(question));
              }
            });
          }
          chosen.forEach(function (question) {
            picked.push(question);
          });
          meta.sources[spec.name] += chosen.length;
          if (chosen.length < take) {
            meta.degraded.push({
              type: type,
              source: spec.name,
              requested: take,
              actual: chosen.length,
              reason: "source pool insufficient; fallback within same type"
            });
          }
        });
      }

      if (picked.length < needed) {
        var fallback = selectWeightedQuestions(typeCandidates, needed - picked.length, {
          selectedIds: selectedIds,
          state: state,
          lowTags: lowTags,
          coreTags: CORE_TAGS,
          bankTags: bankInfo.tags,
          mode: mode,
          rng: rng
        });
        fallback.forEach(function (question) {
          picked.push(question);
        });
        meta.sources.fallbackSameType += fallback.length;
      }

      if (picked.length < needed) {
        meta.degraded.push({
          type: type,
          requested: needed,
          actual: picked.length,
          reason: "not enough unique questions in this type"
        });
      }
      meta.actualCounts[type] = picked.length;
      picked.forEach(function (question) {
        items.push(question);
      });
    });

    return {
      paperId: makePaperId("paper", rng),
      items: items.map(clone),
      meta: meta
    };
  }

  function buildDrillPaper(config) {
    var state = getStateSnapshot();
    var rng = makeRng(config && config.seed);
    var requested = normalizeConfig(config || defaultDrillConfig());
    var qmap = makeQuestionMap();
    var selectedIds = {};
    var items = [];
    var bankInfo = bankTagInfo(state);
    var targetTags = bankInfo.tags;
    var meta = {
      requestedConfig: clone(requested),
      actualCounts: {},
      sources: {
        wrongOriginal: 0,
        weakOriginal: 0,
        tagVariant: 0,
        fallbackSameType: 0
      },
      targetTags: targetTags,
      degraded: []
    };

    TYPE_ORDER.forEach(function (type) {
      var needed = requested[type];
      if (!needed) {
        return;
      }
      var picked = [];
      [
        { source: "wrongOriginal", ids: bankInfo.wrongIds },
        { source: "weakOriginal", ids: bankInfo.weakIds }
      ].forEach(function (group) {
        group.ids.forEach(function (id) {
          var question = qmap[id];
          if (picked.length < needed && question && question.type === type && !selectedIds[id]) {
            selectedIds[id] = true;
            picked.push(clone(question));
            meta.sources[group.source] += 1;
          }
        });
      });

      if (picked.length < needed) {
        var variants = candidatesByType(type).filter(function (question) {
          return targetTags.indexOf(question.knowledgeTag) >= 0 &&
            bankInfo.wrongIds.concat(bankInfo.weakIds).indexOf(question.id) === -1;
        });
        var chosenVariants = selectWeightedQuestions(variants, needed - picked.length, {
          selectedIds: selectedIds,
          state: state,
          preferredTags: targetTags,
          bankTags: targetTags,
          mode: "comprehensive",
          rng: rng
        });
        chosenVariants.forEach(function (question) {
          picked.push(question);
        });
        meta.sources.tagVariant += chosenVariants.length;
      }

      if (picked.length < needed) {
        var fallback = selectWeightedQuestions(candidatesByType(type), needed - picked.length, {
          selectedIds: selectedIds,
          state: state,
          mode: "comprehensive",
          rng: rng
        });
        fallback.forEach(function (question) {
          picked.push(question);
        });
        meta.sources.fallbackSameType += fallback.length;
      }

      if (picked.length < needed) {
        meta.degraded.push({
          type: type,
          requested: needed,
          actual: picked.length,
          reason: "not enough unique questions in this type"
        });
      }
      meta.actualCounts[type] = picked.length;
      picked.forEach(function (question) {
        items.push(question);
      });
    });

    return {
      paperId: makePaperId("drill", rng),
      items: items.map(clone),
      meta: meta
    };
  }

  function buildHomeworkPaper(sourceGroup) {
    var selected = {};
    var items = getQuestions().map(function (question, index) {
      return { question: question, index: index };
    }).filter(function (entry) {
      return entry.question.sourceGroup === sourceGroup && !selected[entry.question.id];
    }).map(function (entry) {
      selected[entry.question.id] = true;
      return entry;
    }).sort(function (a, b) {
      var typeA = TYPE_ORDER.indexOf(a.question.type);
      var typeB = TYPE_ORDER.indexOf(b.question.type);
      if (typeA !== typeB) {
        return typeA - typeB;
      }
      return a.index - b.index;
    }).map(function (entry) {
      return clone(entry.question);
    });

    return {
      paperId: makePaperId("homework", Math.random),
      items: items,
      meta: {
        mode: "homework",
        sourceGroup: sourceGroup,
        actualCount: items.length
      }
    };
  }

  function buildBankPaper(bankType) {
    var state = getStateSnapshot();
    var wrongIds = uniqueStrings(state.wrongBank);
    var weakIds = uniqueStrings(state.weakBank);
    var orderedIds;
    if (bankType === "wrong") {
      orderedIds = wrongIds;
    } else if (bankType === "weak") {
      orderedIds = weakIds;
    } else {
      // allWeak：合并 wrongBank + weakBank，去重，wrong 优先
      var seen = {};
      orderedIds = [];
      wrongIds.concat(weakIds).forEach(function (id) {
        if (!seen[id]) {
          seen[id] = true;
          orderedIds.push(id);
        }
      });
    }
    var qmap = makeQuestionMap();
    var items = [];
    var pickedIds = {};
    orderedIds.forEach(function (id) {
      var question = qmap[id];
      if (question && !pickedIds[id]) {
        pickedIds[id] = true;
        items.push(clone(question));
      }
    });
    return {
      paperId: makePaperId("bank", Math.random),
      items: items,
      meta: {
        mode: "bank",
        bankType: bankType,
        actualCount: items.length
      }
    };
  }

  CP.engine = {
    buildPaper: buildPaper,
    buildDrillPaper: buildDrillPaper,
    buildHomeworkPaper: buildHomeworkPaper,
    buildBankPaper: buildBankPaper,
    getWeakTags: getWeakTags,
    getUntestedOrLowAttemptTags: getUntestedOrLowAttemptTags,
    selectWeightedQuestions: selectWeightedQuestions
  };
})(window);

  <script>
/*
 * 职责：波形题渲染层；根据 waveform 题干生成简化 SVG 波形、HDB3 编码序列和电平序列展示。
 * 状态读写：不读取、不写入 State/localStorage；不参与判分，只向传入 container 写入安全 DOM/SVG。
 */
(function (window, document) {
  var CP = window.CP = window.CP || {};
  var SVG_NS = "http://www.w3.org/2000/svg";

  function clear(node) {
    while (node && node.firstChild) {
      node.removeChild(node.firstChild);
    }
  }

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    Object.keys(attrs || {}).forEach(function (key) {
      if (key === "className") {
        node.className = attrs[key];
      } else if (key === "text") {
        node.textContent = attrs[key];
      } else {
        node.setAttribute(key, attrs[key]);
      }
    });
    (children || []).forEach(function (child) {
      node.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
    });
    return node;
  }

  function svgEl(tag, attrs, children) {
    var node = document.createElementNS(SVG_NS, tag);
    Object.keys(attrs || {}).forEach(function (key) {
      node.setAttribute(key, attrs[key]);
    });
    (children || []).forEach(function (child) {
      node.appendChild(child);
    });
    return node;
  }

  function extractBits(text) {
    var matches = String(text || "").match(/[01]{4,}/g);
    return matches && matches.length ? matches.reduce(function (best, item) {
      return item.length > best.length ? item : best;
    }, "") : "";
  }

  function detectKind(question) {
    var text = String((question && question.question) || "");
    var tag = question && question.knowledgeTag;
    if (tag === "hdb3_rule" || /HDB3/i.test(text)) {
      return "hdb3";
    }
    if (/2FSK/i.test(text)) {
      return "fsk";
    }
    if (/2PSK/i.test(text)) {
      return "psk";
    }
    if (/OOK/i.test(text)) {
      return "ook";
    }
    if (tag === "line_codes" || /NRZ|双极性/.test(text)) {
      return "line";
    }
    return "unknown";
  }

  function render(container, question) {
    clear(container);
    try {
      var kind = detectKind(question);
      var bits = extractBits(question && question.question);
      if (!bits) {
        renderFallback(container);
        return;
      }
      container.className = (container.className || "") + " waveform-rendered";
      if (kind === "hdb3") {
        renderHdb3(container, bits, question);
      } else if (kind === "ook" || kind === "fsk" || kind === "psk") {
        renderCarrierWave(container, bits, kind);
      } else if (kind === "line") {
        renderLineCode(container, bits, question);
      } else {
        renderFallback(container);
      }
    } catch (error) {
      clear(container);
      renderFallback(container);
    }
  }

  function renderFallback(container) {
    container.appendChild(el("p", { className: "muted", text: "无法解析码序列，请参考讲解。" }));
  }

  function hdb3Encode(bits, previousPolarity) {
    var result = [];
    var lastPulse = previousPolarity || 1;
    var lastV = previousPolarity || 1;
    var pulsesSinceV = 0;
    var zeroRun = 0;

    function pushOne() {
      lastPulse = -lastPulse;
      result.push({ bit: "1", level: lastPulse, mark: "" });
      pulsesSinceV += 1;
      zeroRun = 0;
    }

    function pushZero() {
      result.push({ bit: "0", level: 0, mark: "" });
      zeroRun += 1;
    }

    function replaceFourZeros() {
      var start = result.length - 4;
      if (pulsesSinceV % 2 === 1) {
        result[start] = { bit: "0", level: 0, mark: "" };
        result[start + 1] = { bit: "0", level: 0, mark: "" };
        result[start + 2] = { bit: "0", level: 0, mark: "" };
        result[start + 3] = { bit: "0", level: lastPulse, mark: "V" };
        lastV = lastPulse;
      } else {
        var vPolarity = -lastV;
        var bPolarity = vPolarity;
        result[start] = { bit: "0", level: bPolarity, mark: "B" };
        result[start + 1] = { bit: "0", level: 0, mark: "" };
        result[start + 2] = { bit: "0", level: 0, mark: "" };
        result[start + 3] = { bit: "0", level: vPolarity, mark: "V" };
        lastPulse = vPolarity;
        lastV = vPolarity;
      }
      pulsesSinceV = 0;
      zeroRun = 0;
    }

    bits.split("").forEach(function (bit) {
      if (bit === "1") {
        pushOne();
      } else {
        pushZero();
        if (zeroRun === 4) {
          replaceFourZeros();
        }
      }
    });
    return result;
  }

  function renderHdb3(container, bits, question) {
    var previous = /\+V|\+/.test(question.question) ? 1 : -1;
    var encoded = hdb3Encode(bits, previous);
    container.appendChild(el("p", { className: "waveform-sequence", text: "HDB3：" + encoded.map(formatHdb3Token).join(" ") }));
    container.appendChild(el("p", { className: "muted", text: "B 为平衡脉冲，V 为违代码；题干前一非零码按 +V 处理。" }));
    container.appendChild(drawLevelWave(encoded.map(function (item) {
      return item.level;
    }), bits, encoded.map(function (item) {
      return item.mark;
    })));
  }

  function formatHdb3Token(item) {
    if (item.level === 0) {
      return "0";
    }
    return (item.level > 0 ? "+1" : "-1") + (item.mark ? "(" + item.mark + ")" : "");
  }

  function renderCarrierWave(container, bits, kind) {
    var title = kind === "ook" ? "OOK" : kind === "fsk" ? "2FSK" : "2PSK";
    container.appendChild(el("p", { className: "waveform-sequence", text: title + " 序列：" + bits.split("").join(" ") }));
    container.appendChild(drawCarrierWave(bits, kind));
  }

  function renderLineCode(container, bits, question) {
    var levels = bits.split("").map(function (bit) {
      return bit === "1" ? 1 : -1;
    });
    container.appendChild(el("p", { className: "waveform-sequence", text: "双极性NRZ：" + levels.map(function (level) {
      return level > 0 ? "+1" : "-1";
    }).join(" ") }));
    container.appendChild(drawLevelWave(levels, bits, levels.map(function () {
      return "";
    })));
  }

  function drawBaseSvg(bits, height) {
    var bitWidth = 42;
    var width = Math.max(1, bits.length) * bitWidth;
    var svg = svgEl("svg", {
      viewBox: "0 0 " + width + " " + height,
      width: "100%",
      style: "height:auto;max-width:100%;display:block;",
      role: "img",
      "aria-label": "简化波形图"
    });
    svg.appendChild(svgEl("line", {
      x1: "0",
      y1: String(height / 2),
      x2: String(width),
      y2: String(height / 2),
      stroke: "#98a2b3",
      "stroke-width": "1"
    }));
    bits.split("").forEach(function (bit, index) {
      var x = index * bitWidth;
      svg.appendChild(svgEl("line", {
        x1: String(x),
        y1: "22",
        x2: String(x),
        y2: String(height - 14),
        stroke: "#d0d5dd",
        "stroke-width": "1",
        "stroke-dasharray": "4 4"
      }));
      svg.appendChild(svgEl("text", {
        x: String(x + bitWidth / 2),
        y: "14",
        "text-anchor": "middle",
        "font-size": "11",
        fill: "#344054"
      }, [document.createTextNode(bit)]));
    });
    svg.appendChild(svgEl("line", {
      x1: String(width),
      y1: "22",
      x2: String(width),
      y2: String(height - 14),
      stroke: "#d0d5dd",
      "stroke-width": "1",
      "stroke-dasharray": "4 4"
    }));
    return { svg: svg, bitWidth: bitWidth, width: width, height: height };
  }

  function drawCarrierWave(bits, kind) {
    var base = drawBaseSvg(bits, 112);
    var path = [];
    bits.split("").forEach(function (bit, index) {
      var x0 = index * base.bitWidth;
      var cycles = kind === "fsk" ? (bit === "1" ? 4 : 2) : 3;
      var active = kind === "ook" ? bit === "1" : true;
      var phase = kind === "psk" && bit === "1" ? Math.PI : 0;
      for (var step = 0; step <= 24; step += 1) {
        var x = x0 + step / 24 * base.bitWidth;
        var y = base.height / 2;
        if (active) {
          y += Math.sin(step / 24 * Math.PI * 2 * cycles + phase) * 24;
        }
        path.push((path.length ? "L" : "M") + round(x) + " " + round(y));
      }
    });
    base.svg.appendChild(svgEl("path", {
      d: path.join(" "),
      fill: "none",
      stroke: "#0f766e",
      "stroke-width": "2"
    }));
    return base.svg;
  }

  function drawLevelWave(levels, bits, marks) {
    var base = drawBaseSvg(bits, 118);
    var high = 38;
    var mid = base.height / 2;
    var low = 84;
    var path = [];
    var previousY = mid;
    levels.forEach(function (level, index) {
      var x0 = index * base.bitWidth;
      var x1 = x0 + base.bitWidth;
      var y = level > 0 ? high : level < 0 ? low : mid;
      if (!path.length) {
        path.push("M" + x0 + " " + y);
      } else {
        path.push("L" + x0 + " " + previousY);
        path.push("L" + x0 + " " + y);
      }
      path.push("L" + x1 + " " + y);
      previousY = y;
      if (marks[index]) {
        base.svg.appendChild(svgEl("text", {
          x: String(x0 + base.bitWidth / 2),
          y: String(y - 7),
          "text-anchor": "middle",
          "font-size": "10",
          fill: "#b42318",
          "font-weight": "700"
        }, [document.createTextNode(marks[index])]));
      }
    });
    base.svg.appendChild(svgEl("path", {
      d: path.join(" "),
      fill: "none",
      stroke: "#0f766e",
      "stroke-width": "2"
    }));
    return base.svg;
  }

  function round(value) {
    return Math.round(value * 10) / 10;
  }

  CP.waveform = {
    render: render,
    _test: {
      extractBits: extractBits,
      detectKind: detectKind,
      hdb3Encode: hdb3Encode,
      formatHdb3Token: formatHdb3Token
    }
  };
})(window, document);

(function (window, document) {

      }
    });
    (children || []).forEach(function (child) {
      node.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
    });

  }

  function normalizeText(value) {

  function sortedKeys(values) {

    }
    if (typeof answer === "boolean") {
      return answer ? "对" : "错";
    }
    return String(answer);
  }

  function userAnswerToText(question, answer) {
    if (question.type === "judge") {
      return answer === true ? "对" : answer === false ? "错" : "未作答";
    }
    if (Array.isArray(answer)) {
      return answer.map(function (item) {
        return normalizeText(item);
      }).filter(Boolean).join("；") || "未作答";
    }
    return normalizeText(answer) || "未作答";
  }

  function scoreAnswer(question, userAnswer, selfCorrect) {
    if (question.type === "single") {
      return String(userAnswer || "") === String(question.answer);
    }
    if (question.type === "multiple") {
      return sameSet(userAnswer, question.answer);
    }
    if (question.type === "judge") {
      return userAnswer === question.answer;
    }
    return selfCorrect === true;
  }

  function getBlankCount(question) {
    var count = (question.question.match(/____/g) || []).length;
    return count || blankGroups(question.answer).length;
  }

  function getTagLabel(tag) {
    return (CP.tags && CP.tags[tag]) || tag;
  }

  function getAnswer(question) {
    if (!currentAnswers[question.id]) {
      currentAnswers[question.id] = {
        userAnswer: question.type === "multiple" || question.type === "blank" ? [] : null,
        submitted: false,
        correct: false,
        markedWeak: false,
        selfEvaluated: question.type !== "blank" && question.type !== "calculation" && question.type !== "waveform"
      };
    }
    return currentAnswers[question.id];
  }

  function isSubjective(question) {
    return question.type === "blank" || question.type === "calculation" || question.type === "waveform";
  }

  function isCorrectOption(question, optionKey) {
    if (question.type === "multiple") {
      return Array.isArray(question.answer) && question.answer.indexOf(optionKey) >= 0;
    }
    if (question.type === "judge") {
      return String(question.answer) === optionKey;
    }
    return String(question.answer) === optionKey;
  }

  function isSelectedOption(question, answer, optionKey) {
    if (question.type === "multiple") {
      return Array.isArray(answer.userAnswer) && answer.userAnswer.indexOf(optionKey) >= 0;
    }
    if (question.type === "judge") {
      return answer.userAnswer !== null && String(answer.userAnswer) === optionKey;
    }
    return answer.userAnswer === optionKey;
  }

  function configFromForm(root) {
    var config = {};
    TYPES.forEach(function (type) {
      var input = root.querySelector('[data-config-type="' + type + '"]');
      var value = Number(input && input.value);
      config[type] = Number.isFinite(value) && value >= 0 ? Math.floor(value) : DEFAULT_CONFIG[type];
    });
    return config;
  }

  function renderConfigControls() {

        el("span", { text: TYPE_LABELS[type] }),
        el("input", {

          type: "number",

          step: "1",
          value: String(DEFAULT_CONFIG[type]),
          "data-config-type": type
        })
      ]);
    }));
  }

  function ensurePaper() {
    if (!currentPaper) {
      currentPaper = CP.engine.buildPaper(DEFAULT_CONFIG, { mode: "comprehensive" });

      currentConfig = clone(DEFAULT_CONFIG);
      currentAnswers = {};

  function renderPractice() {
    var root = byId("view-practice");
    clear(root);
    ensurePaper();
    root.appendChild(el("section", { className: "panel practice-head" }, [
      el("h1", { text: practiceTitle() }),
      el("p", { className: "muted", text: "共 " + currentPaper.items.length + " 题。每题独立提交，提交后锁定并即时显示答案与讲解。" })
    ]));

  function practiceTitle() {
    if (currentMode === "homework" && currentPaper && currentPaper.meta && currentPaper.meta.sourceGroup) {
      return currentPaper.meta.sourceGroup + " 练习";
    }
    return MODE_LABELS[currentMode] || "做题";

  function renderQuestion(question, index) {
    var answer = getAnswer(question);
    var cardClass = "panel question-card" + (answer.submitted ? " is-submitted" : "");
    var panel = el("section", { className: cardClass, "data-qid": question.id }, [
      el("div", { className: "question-title-row" }, [
        renderStar(question, answer),
        el("div", { className: "question-title" }, [
          el("h2", { text: (index + 1) + ". [" + TYPE_LABELS[question.type] + "] " + getTagLabel(question.knowledgeTag) }),
          el("p", { text: question.question })
        ])
      ])
    ]);
    panel.appendChild(renderAnswerControl(question, answer));
    if (!answer.submitted) {
      panel.appendChild(el("div", { className: "question-actions" }, [
        submitQuestionButton(question, answer)
      ]));
    } else {
      panel.appendChild(renderFeedback(question, answer));
    }
    return panel;
  }

  function renderStar(question, answer) {
    var button = el("button", {
      type: "button",
      className: "star-button" + (answer.markedWeak ? " is-active" : ""),
      "aria-label": answer.markedWeak ? "取消拿不准标记" : "标记拿不准",
      text: "★"
    });
    if (!answer.submitted) {
      button.disabled = true;
      button.title = "提交本题后可标记拿不准";
    }
    button.addEventListener("click", function () {
      if (!answer.submitted) {
        return;
      }
      answer.markedWeak = !answer.markedWeak;
      renderPractice();
    });
    return button;
  }

  function renderAnswerControl(question, answer) {
    var wrap = el("div", { className: "answer-area" });
    if (question.type === "single" || question.type === "judge") {
      var options = question.type === "judge"
        ? [{ key: "true", text: "对" }, { key: "false", text: "错" }]
        : question.options;
      options.forEach(function (option) {
        wrap.appendChild(renderOptionItem(question, answer, option, "radio"));
      });
    } else if (question.type === "multiple") {
      answer.userAnswer = answer.userAnswer || [];
      question.options.forEach(function (option) {
        wrap.appendChild(renderOptionItem(question, answer, option, "checkbox"));
      });
    } else if (question.type === "blank") {
      answer.userAnswer = answer.userAnswer || [];
      for (var i = 0; i < getBlankCount(question); i += 1) {
        wrap.appendChild(renderBlankInput(question, answer, i));
      }
    } else {
      wrap.appendChild(renderTextArea(question, answer));
      if (question.type === "waveform") {
        var placeholder = el("div", { className: "waveform-placeholder", text: "波形绘制将在 E 阶段接入，这里先保留题干与作答区。" });
        wrap.appendChild(placeholder);
        if (CP.waveform && typeof CP.waveform.render === "function") {
          CP.waveform.render(placeholder, question);
        }
      }
    }
    return wrap;
  }

  function renderOptionItem(question, answer, option, inputType) {
    var selected = isSelectedOption(question, answer, option.key);
    var correct = isCorrectOption(question, option.key);
    var className = "option-item";
    if (answer.submitted && correct) {
      className += " correct";
    }
    if (answer.submitted && selected && !correct) {
      className += " wrong";
    }
    if (answer.submitted) {
      className += " locked";
    }
    var label = el("label", { className: className });
    var input = el("input", {
      type: inputType,
      name: "answer-" + question.id,
      value: option.key
    });
    input.checked = selected;
    input.disabled = answer.submitted;
    input.addEventListener("change", function () {
      if (answer.submitted) {
        return;
      }
      if (question.type === "judge") {
        answer.userAnswer = option.key === "true";
      } else if (question.type === "multiple") {
        var selectedKeys = answer.userAnswer || [];
        if (input.checked && selectedKeys.indexOf(option.key) === -1) {
          selectedKeys.push(option.key);
        }
        if (!input.checked) {
          selectedKeys = selectedKeys.filter(function (key) {
            return key !== option.key;
          });
        }
        answer.userAnswer = selectedKeys;
      } else {
        answer.userAnswer = option.key;
      }
    });
    label.appendChild(input);
    label.appendChild(el("span", { className: "option-key", text: option.key.length === 1 ? option.key : "" }));
    label.appendChild(el("span", { className: "option-text", text: option.key.length === 1 ? option.text : option.text }));
    return label;
  }

  function renderBlankInput(question, answer, index) {
    var input = el("input", {
      className: "field-input",
      type: "text",
      placeholder: "第 " + (index + 1) + " 空"
    });
    input.value = answer.userAnswer[index] || "";
    input.disabled = answer.submitted;
    input.addEventListener("input", function () {
      answer.userAnswer[index] = input.value;
    });
    return input;
  }

  function renderTextArea(question, answer) {
    var textarea = el("textarea", { className: "answer-textarea", rows: "4", placeholder: "写下你的解答或波形描述" });
    textarea.value = answer.userAnswer || "";
    textarea.disabled = answer.submitted;
    textarea.addEventListener("input", function () {
      answer.userAnswer = textarea.value;
    });
    return textarea;
  }

  function submitQuestionButton(question, answer) {
    var button = el("button", { type: "button", text: "提交本题" });
    button.addEventListener("click", function () {
      if (!hasAnyAnswer(question, answer)) {
        window.alert("请先作答。");
        return;
      }
      answer.submitted = true;
      if (isSubjective(question)) {
        answer.correct = false;
        answer.selfEvaluated = false;
      } else {
        answer.correct = scoreAnswer(question, answer.userAnswer);
        answer.selfEvaluated = true;
      }
      renderPractice();
    });
    return button;
  }

  function hasAnyAnswer(question, answer) {
    if (question.type === "multiple") {
      return Array.isArray(answer.userAnswer) && answer.userAnswer.length > 0;
    }
    if (question.type === "blank") {
      return Array.isArray(answer.userAnswer) && answer.userAnswer.some(function (value) {
        return normalizeText(value);
      });
    }
    if (question.type === "calculation" || question.type === "waveform") {
      return !!normalizeText(answer.userAnswer);
    }
    return answer.userAnswer !== null && answer.userAnswer !== undefined && answer.userAnswer !== "";
  }

  function renderFeedback(question, answer) {
    var feedbackClass = "feedback " + (answer.correct ? "good" : "bad");
    var feedback = el("div", { className: feedbackClass }, [
      el("p", { className: "answer-line", text: feedbackStatusText(question, answer) + " · 正确答案：" + answerToText(question.answer) }),
      el("p", { className: "explanation", text: "讲解：" + question.explanation }),
      el("p", { className: "muted", text: "考点：" + getTagLabel(question.knowledgeTag) })
    ]);
    if (isSubjective(question) && !answer.selfEvaluated) {
      feedback.appendChild(el("div", { className: "question-actions" }, [
        selfEvalButton(question, answer, true),
        selfEvalButton(question, answer, false)
      ]));
    }
    return feedback;
  }

  function feedbackStatusText(question, answer) {
    if (isSubjective(question) && !answer.selfEvaluated) {
      return "请自评";
    }
    return answer.correct ? "回答正确" : "回答错误";
  }

  function selfEvalButton(question, answer, correct) {
    var button = el("button", { type: "button", text: correct ? "我对了" : "我错了", className: correct ? "" : "danger" });
    button.addEventListener("click", function () {
      answer.correct = correct;
      answer.selfEvaluated = true;
      renderPractice();
    });
    return button;
  }

  function renderPaperFooter() {
    var ready = isPaperReady();
    var status = ready ? "全部题目已完成，可查看结果。" : "请逐题提交；主观题需完成自评后才能查看结果。";
    var button = el("button", { type: "button", text: "查看结果" });
    button.disabled = !ready;
    button.addEventListener("click", function () {
      if (!isPaperReady()) {
        return;
      }
      buildPendingFromSubmitted();
      routeTo("result");
    });
    return el("section", { className: "panel paper-footer" }, [
      el("p", { className: "muted", text: status }),
      button
    ]);
  }

  function isPaperReady() {
    return currentPaper && currentPaper.items.every(function (question) {
      var answer = getAnswer(question);
      return answer.submitted && (!isSubjective(question) || answer.selfEvaluated);
    });
  }

  function buildPendingFromSubmitted() {
    var rows = currentPaper.items.map(function (question) {
      var answer = getAnswer(question);
      return {
        question: question,
        qid: question.id,
        userAnswer: answer.userAnswer === undefined ? null : answer.userAnswer,
        correct: answer.correct === true,
        confidence: "sure",
        markedWeak: answer.markedWeak === true,
        tags: [question.knowledgeTag],
        subjective: isSubjective(question)
      };
    });
    resultRows = rows;
    syncPending(new Date().toISOString());
  }

  function syncPending(date) {
    var items = resultRows.map(function (row) {
      return {
        qid: row.qid,
        userAnswer: row.userAnswer,
        correct: row.correct,
        confidence: "sure",
        markedWeak: row.markedWeak === true,
        tags: row.tags
      };
    });
    var correctCount = items.filter(function (item) {
      return item.correct;
    }).length;
    CP.state.setPendingResult({
      paperId: currentPaper.paperId,
      date: date || new Date().toISOString(),
      score: items.length ? Math.round(correctCount / items.length * 100) : 0,
      items: items
    });
  }

  function renderResult() {
    var root = byId("view-result");
    clear(root);
    var pending = CP.state.getPendingResult();
    if (!pending) {
      root.appendChild(el("section", { className: "panel" }, [
        el("h1", { text: "结果" }),
        el("p", { text: "暂无待提交结果。" })
      ]));
      return;
    }
    if (!resultRows.length) {
      rebuildRowsFromPending(pending);
    }
    var correctCount = resultRows.filter(function (row) { return row.correct; }).length;
    var wrongCount = resultRows.length - correctCount;
    var weakCount = resultRows.filter(function (row) {
      return row.markedWeak;
    }).length;
    root.appendChild(el("section", { className: "panel" }, [
      el("h1", { text: "结果" }),
      el("p", { text: "正确率 " + (resultRows.length ? Math.round(correctCount / resultRows.length * 100) : 0) +
          "% / 错题 " + wrongCount + " / 星标题 " + weakCount })
    ]));
    resultRows.forEach(function (row, index) {
      root.appendChild(renderResultRow(row, index));
    });
    root.appendChild(renderWeakSummary());
    root.appendChild(renderResultExits());
  }

  function rebuildRowsFromPending(pending) {
    var map = questionMap();
    resultRows = pending.items.map(function (item) {
      var question = map[item.qid] || { id: item.qid, question: item.qid, type: "single", answer: "", explanation: "", knowledgeTag: "" };
      return {
        question: question,
        qid: item.qid,
        userAnswer: item.userAnswer,
        correct: item.correct,
        confidence: "sure",
        markedWeak: item.markedWeak,
        tags: item.tags || [question.knowledgeTag],
        subjective: isSubjective(question)
      };
    });
  }

  function renderResultRow(row, index) {
    var q = row.question;
    var panel = el("section", { className: "panel result-card" }, [
      el("h2", { text: (index + 1) + ". " + (row.correct ? "正确" : "错误") + " / " + getTagLabel(q.knowledgeTag) }),
      el("p", { text: q.question }),
      el("p", { text: "你的答案：" + userAnswerToText(q, row.userAnswer) }),
      el("p", { text: "标准答案：" + answerToText(q.answer) }),
      el("p", { text: "讲解：" + q.explanation })
    ]);
    panel.appendChild(el("div", { className: "question-actions" }, [
      resultButton(row.markedWeak ? "已标星" : "标记为不熟", function () {
        row.markedWeak = true;
        syncPending();
        renderResult();
      }, "secondary"),
      resultButton("加入错题库", function () {
        row.correct = false;
        syncPending();
        renderResult();
      }, "danger")
    ]));
    return panel;
  }

  function resultButton(text, onClick, className) {
    var button = el("button", { type: "button", text: text, className: className || "" });
    button.addEventListener("click", onClick);
    return button;
  }

  function renderWeakSummary() {
    var weakTags = CP.engine.getWeakTags().slice(0, 8);
    var panel = el("section", { className: "panel" }, [
      el("h2", { text: "薄弱考点" })
    ]);
    if (!weakTags.length) {
      panel.appendChild(el("p", { className: "muted", text: "提交保存后会根据历史记录生成薄弱考点。" }));
    } else {
      weakTags.forEach(function (entry) {
        panel.appendChild(el("p", { text: getTagLabel(entry.tag) + "：薄弱分 " + entry.score }));
      });
    }
    return panel;

  function renderResultExits() {
    return el("section", { className: "panel" }, [
      el("div", { className: "action-grid" }, [
        resultButton("重做错题/不熟题", function () {
          CP.state.commitPendingResult();
          var drill = CP.engine.buildDrillPaper(currentConfig);
          startPaper("drill", currentConfig, drill);
        }, "secondary"),
        resultButton(nextAfterCommitLabel(), function () {
          CP.state.commitPendingResult();
          if (currentMode === "homework" || currentMode === "bank") {
            currentPaper = null;
            resultRows = [];
            routeTo("home");

          }

        resultButton("重新生成一套，不保存本次记录", function () {

        }, "danger")
      ])
    ]);
