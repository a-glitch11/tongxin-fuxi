  function nextAfterCommitLabel() {
    if (currentMode === "drill") {
      return "继续";
    }
    if (currentMode === "homework" || currentMode === "bank") {
      return "保存记录，返回首页";
    }
    return "加入错题库，进入下一套";
  }

  function renderReview() {
    var root = byId("view-review");
    clear(root);
    var points = [
      "信息量：I=-log2(P)；bit/Hartley/nat 是信息量单位，Baud 是码元速率单位。",
      "码元速率RB=1/Ts；信息速率Rb=RB·log2(M)，2/4/8/16进制分别为1/2/3/4 bit/码元。",
      "误码率=错码数/总码元数；误信率=错比特数/总比特数。",
      "2e^-t·u(t)是能量信号；未乘u(t)的2e^-t不是能量信号。",
      "高斯过程经过线性系统仍为高斯过程；广义平稳均值和方差与时间无关，自相关只与时间间隔有关。",
      "R(0)表示平均功率，R(∞)表示直流功率。",
      "恒参信道参数基本稳定，随参信道参数随机变化；加性干扰独立存在，乘性干扰无信号时消失。",
      "香农公式C=B·log2(1+S/N)，S/N要用线性值；B趋于无穷时容量不必趋于无穷。",
      "AM调幅系数ma=(Vmax-Vmin)/(Vmax+Vmin)；DSB含上下边带；SSB省功率、省带宽；FDM按频率分割。",
      "FM：β=Δf/fm，卡森B≈2(Δf+fm)；不知道m(t)时可能无法区分FM/PM。",
      "NRZ/RZ/AMI/CMI/HDB3：AMI无直流，CMI定时丰富，HDB3用000V或B00V破坏长连0。",
      "OOK看载波有无，2FSK看频率，2PSK看相位；相干2PSK抗噪最好，2ASK最差且对门限敏感，2FSK频带利用率最低。"
    ];
    var panel = el("section", { className: "panel" }, [
      el("h1", { text: "考前速背" })
    ]);
    points.forEach(function (point) {
      panel.appendChild(el("p", { text: point }));
    });
    root.appendChild(panel);
  }

  function findLastAttempt(state, qid) {
    var history = Array.isArray(state.history) ? state.history : [];
    for (var i = history.length - 1; i >= 0; i -= 1) {
      var items = history[i] && history[i].items ? history[i].items : [];
      for (var j = 0; j < items.length; j += 1) {
        if (items[j] && items[j].qid === qid) {
          return items[j];
        }
      }
    }
    return null;
  }

  function renderMistakeCard(state, qid, map) {
    var q = map[qid];
    if (!q) {
      return el("section", { className: "panel result-card" }, [
        el("p", { className: "muted", text: "题目 " + qid + " 不在当前题库中。" })
      ]);
    }
    var panel = el("section", { className: "panel result-card" }, [
      el("h2", { text: "[" + (TYPE_LABELS[q.type] || q.type) + "] " + getTagLabel(q.knowledgeTag) }),
      el("p", { text: q.question }),
      el("p", { className: "muted", text: "来源：" + (q.sourceGroup || "未知") }),
      el("p", { text: "正确答案：" + answerToText(q.answer) }),
      el("p", { text: "讲解：" + q.explanation })
    ]);
    var last = findLastAttempt(state, qid);
    if (last) {
      panel.appendChild(el("p", {
        className: "muted",
        text: "上次我的答案：" + userAnswerToText(q, last.userAnswer) +
          " / 最近一次" + (last.correct ? "正确" : "错误") +
          " / 自评：" + (last.confidence || "sure")
      }));
    } else {
      panel.appendChild(el("p", { className: "muted", text: "无历史作答记录。" }));
    }
    return panel;
  }

  function renderBankSection(state, title, ids, emptyText, map) {
    var panel = el("section", { className: "panel" }, [el("h2", { text: title })]);
    if (!ids.length) {
      panel.appendChild(el("p", { className: "muted", text: emptyText }));
      return panel;
    }
    ids.forEach(function (qid) {
      panel.appendChild(renderMistakeCard(state, qid, map));
    });
    return panel;
  }

  function uniqueIds(list) {
    var seen = {};
    var result = [];
    (Array.isArray(list) ? list : []).forEach(function (id) {
      if (id !== undefined && id !== null && !seen[id]) {
        seen[id] = true;
        result.push(String(id));
      }
    });
    return result;
  }

  function renderMistake() {
    var root = byId("view-mistake");
    clear(root);
    var state = CP.state.getState();
    var map = questionMap();
    var wrongIds = uniqueIds(state.wrongBank);
    var weakIds = uniqueIds(state.weakBank);
    var allWeak = uniqueIds(wrongIds.concat(weakIds));

    var head = el("section", { className: "panel" }, [
      el("h1", { text: "错题与不熟题" }),
      el("p", { text: "错题 " + wrongIds.length + " 题 / 不熟题 " + weakIds.length + " 题 / 全部弱项 " + allWeak.length + " 题。" })
    ]);
    var actions = el("div", { className: "action-grid" }, [
      bankPracticeButton("只练原错题", "wrong", wrongIds.length),
      bankPracticeButton("只练不熟题", "weak", weakIds.length),
      bankPracticeButton("练全部弱项", "allWeak", allWeak.length)
    ]);
    var backButton = el("button", { type: "button", text: "返回首页", className: "secondary" });
    backButton.addEventListener("click", function () {
      routeTo("home");
    });
    actions.appendChild(backButton);
    head.appendChild(actions);
    root.appendChild(head);

    root.appendChild(renderBankSection(state, "错题池", wrongIds, "暂无错题", map));
    root.appendChild(renderBankSection(state, "不熟题池", weakIds, "暂无不熟题", map));
    root.appendChild(renderBankSection(state, "全部弱项", allWeak, "暂无弱项", map));
  }

  function bankPracticeButton(text, bankType, count) {
    var button = el("button", { type: "button", text: text });
    button.disabled = count === 0;
    button.addEventListener("click", function () {
      var paper = CP.engine.buildBankPaper(bankType);
      if (!paper.items.length) {
        window.alert("当前没有可练习的题目。");
        return;
      }
      startPaper("bank", currentConfig, paper);
    });
    return button;
  }

  function renderView(view) {
    if (view === "home") {
      renderHome();
    } else if (view === "practice") {
      renderPractice();
    } else if (view === "result") {
      renderResult();
    } else if (view === "mistake") {
      renderMistake();
    } else if (view === "review") {
      renderReview();
    }
  }

  function init(options) {
    routeTo = options && options.routeTo ? options.routeTo : routeTo;
  }

  CP.ui = {
    init: init,
    renderView: renderView,
    startPaper: startPaper,
    scoreAnswer: scoreAnswer
  };
})(window, document);

</script>
  <script>
/*
 * 职责：应用装配与极简显隐路由，调用 window.CP.ui 渲染当前视图。
 * 状态读写：启动时调用 state.load；具体状态读写由 ui.js 通过 state API 完成。
 */
(function (window, document) {
  var CP = window.CP = window.CP || {};
  var views = ["home", "practice", "result", "mistake", "review"];

  function byId(id) {
    return document.getElementById(id);
  }

  function getRoute() {
    var hash = window.location.hash.replace(/^#\/?/, "");
    return views.indexOf(hash) >= 0 ? hash : "home";
  }

  function routeTo(view) {
    window.location.hash = view;
  }

  function renderRoute() {
    var active = getRoute();
    views.forEach(function (view) {
      var panel = byId("view-" + view);
      if (panel) {
        panel.hidden = view !== active;
      }
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-view-link]"), function (button) {
      var isActive = button.getAttribute("data-view-link") === active;
      if (isActive) {
        button.setAttribute("aria-current", "page");
      } else {
        button.removeAttribute("aria-current");
      }
    });
    if (CP.ui && typeof CP.ui.renderView === "function") {
      CP.ui.renderView(active);
    }
  }

  function bindRoutes() {
    Array.prototype.forEach.call(document.querySelectorAll("[data-view-link], [data-route]"), function (button) {
      button.addEventListener("click", function () {
        routeTo(button.getAttribute("data-view-link") || button.getAttribute("data-route"));
      });
    });
    window.addEventListener("hashchange", renderRoute);
  }

  function init() {
    CP.state.load();
    CP.ui.init({ routeTo: routeTo });
    bindRoutes();
    if (!window.location.hash) {
      window.location.hash = "home";
    }
    renderRoute();
  }

  document.addEventListener("DOMContentLoaded", init);
})(window, document);

</script>
</body>
